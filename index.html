<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michelangelo Pizza Collection Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        canvas { border: 1px solid #000; }
        #status { font-size: 24px; }
    </style>
</head>
<body>
    <div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="status"></div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let pizzaCount = 0;
        let enemies = [];
        let timer = 30;
        let gameInterval, timerInterval;
        let secretEnding = false;

        class Enemy {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 20;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'red';
                ctx.fill();
                ctx.closePath();
            }
        }

        function initEnemies() {
            for (let i = 0; i < 4; i++) {
                enemies.push(new Enemy());
            }
        }

        function drawPizza() {
            for (let i = 0; i < 15; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 15, 0, Math.PI * 2);
                ctx.fillStyle = 'yellow';
                ctx.fill();
                ctx.closePath();
            }
        }

        function updateStatus() {
            const status = document.getElementById('status');
            status.textContent = `Pizza Collected: ${pizzaCount} | Time Left: ${timer}s`;
        }

        function checkWin() {
            if (pizzaCount === 8) {
                alert('You Win! You collected 8 pizzas!');
            } else if (pizzaCount === 15) {
                secretEnding = true;
                alert('Secret Ending Unlocked! You collected 15 pizzas!');
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPizza();
            enemies.forEach(enemy => enemy.draw());
            updateStatus();
            checkWin();
        }

        function startGame() {
            pizzaCount = 0;
            initEnemies();
            gameInterval = setInterval(gameLoop, 100);
            timerInterval = setInterval(() => {
                timer--;
                if (timer <= 0) {
                    clearInterval(gameInterval);
                    clearInterval(timerInterval);
                    alert('Time Up! Game Over!');
                }
            }, 1000);
        }

        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            // Simple collision detection with pizza
            if (Math.random() < 0.3) { // Assuming player clicks on pizza
                pizzaCount++;
            }
        });

        startGame();
    </script>
</body>
</html>
