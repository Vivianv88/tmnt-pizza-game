<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMNT Pizza Game</title>
    <style>
        /* Add some basic styling */
        body { font-family: Arial, sans-serif; }
        #secretScreen { display: none; } /* Initially hidden */
        .active #secretScreen { display: block; } /* Show when .active class is added */
    </style>
</head>
<body>
    <h1>Welcome to the TMNT Pizza Game!</h1>
    <div id="gameArea">
        <p>Play the game by clicking the button below!</p>
        <button id="startButton">Start Game</button>
    </div>
    <div id="secretScreen" class="hidden">
        <h2>Secret Level!</h2>
        <p>You have unlocked the secret level!</p>
    </div>
    <script>
        document.getElementById('startButton').addEventListener('click', function() {
            document.body.classList.add('active'); // Add active class to the body
        });
    </script>
</body>
</html>
